<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Custom Sections - Stage Music Admin</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #1a1a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }

        .page-header { padding: 20px; background: linear-gradient(135deg, #e31e24, #764ba2); margin-bottom: 24px; }
        .page-title { font-size: 2em; font-weight: 700; margin: 0 0 8px 0; }
        .page-subtitle { color: rgba(255,255,255,0.8); font-size: 1em; margin: 0; }

        .tabs-container { display: flex; gap: 8px; padding: 0 20px; margin-bottom: 24px; border-bottom: 2px solid #333; overflow-x: auto; }
        .tab-btn { padding: 12px 20px; background: transparent; color: #888; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-size: 0.95em; font-weight: 600; transition: all 0.3s; white-space: nowrap; }
        .tab-btn:hover { color: #fff; }
        .tab-btn.active { color: #e31e24; border-bottom-color: #e31e24; }

        .tab-content { display: none; padding: 0 20px 40px 20px; }
        .tab-content.active { display: block; }

        .section { background: #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .section-title { font-size: 1.4em; font-weight: 600; margin: 0 0 16px 0; color: #e31e24; }

        .info-box { background: rgba(255, 193, 7, 0.15); border: 2px solid #ffc107; border-radius: 8px; padding: 16px; margin-bottom: 24px; color: #ffc107; }

        .songs-list { display: grid; gap: 16px; }
        .song-item-list { display: flex; align-items: center; gap: 16px; padding: 16px; background: #1a1a1a; border-radius: 8px; border: 2px solid #333; cursor: move; transition: all 0.2s; }
        .song-item-list:hover { border-color: #e31e24; background: #252525; }
        .song-item-list.dragging { opacity: 0.5; border-color: #28a745; }
        .song-item-list.drag-over { border-top: 3px solid #28a745; }
        .drag-handle { cursor: grab; font-size: 20px; color: #888; margin-right: 8px; }
        .drag-handle:active { cursor: grabbing; }
        .song-number { width: 32px; height: 32px; background: #e31e24; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .song-cover-small { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .song-info-small { flex: 1; min-width: 0; }
        .song-title-small { font-weight: 600; font-size: 1em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .song-artist-small { color: #888; font-size: 0.85em; }
        .remove-btn { padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; min-height: 44px; }
        .remove-btn:hover { background: #c82333; transform: scale(1.05); }

        .search-box { width: 100%; padding: 14px; font-size: 16px; border: 2px solid #333; border-radius: 8px; margin-bottom: 16px; background: #1a1a1a; color: #fff; }
        .search-box:focus { outline: none; border-color: #e31e24; }

        .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-bottom: 10px; }
        .song-item { background: #1a1a1a; border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .song-item:hover { background: #333; border-color: #e31e24; transform: translateY(-2px); }
        .song-item.selected { border-color: #28a745; background: rgba(40, 167, 69, 0.2); }
        .song-cover { width: 100%; aspect-ratio: 1; border-radius: 6px; object-fit: cover; margin-bottom: 8px; }
        .song-name { font-weight: 600; font-size: 0.9em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .song-artist { font-size: 0.8em; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .hint-box { margin: 20px 0; padding: 15px; background: rgba(40, 167, 69, 0.15); border-radius: 8px; border: 2px dashed #28a745; color: #28a745; font-weight: 600; text-align: center; }
        .add-btn-container { background: #2a2a2a; padding: 20px; margin-top: 20px; border-radius: 8px; text-align: center; }
        .add-btn { padding: 16px 24px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1.1em; transition: all 0.2s; width: 100%; max-width: 400px; min-height: 56px; }
        .add-btn:hover:not(:disabled) { background: #218838; transform: scale(1.02); }
        .add-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        .add-btn:not(:disabled) { box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4); } 50% { box-shadow: 0 4px 20px rgba(40, 167, 69, 0.6); } }
        .selection-status { margin-top: 12px; color: #888; font-size: 0.9em; }
        .empty-state { text-align: center; padding: 40px; color: #888; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .page-header { padding: 16px; }
            .page-title { font-size: 1.5em; }
            .tabs-container { padding: 0 12px; }
            .tab-btn { padding: 10px 16px; font-size: 0.9em; }
            .tab-content { padding: 0 12px 24px 12px; }
            .section { padding: 16px; }
            .songs-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; max-height: 350px; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1 class="page-title">🎵 Manage Custom Sections</h1>
        <p class="page-subtitle">5 sections: Haryanvi Tadka, Haryanvi Love, Rajasthani Hits, Rajasthani Soul, Bhojpuri Dhamaka</p>
    </div>

    <div class="tabs-container" id="tabs-container">
        <!-- Tabs will be loaded dynamically -->
    </div>

    <div id="tabs-content">
        <!-- Tab contents will be loaded dynamically -->
    </div>

    <script src="custom-sections.js"></script>
</body>
</html>
