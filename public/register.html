<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Stage Music</title>
    <link rel="icon" type="image/png" href="/assets/stage-logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <!-- Background Animation -->
        <div class="bg-animation">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>

        <!-- Auth Box -->
        <div class="auth-box">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon"></div>
                <h1>STAGE <span>Music</span></h1>
            </div>

            <h2 class="auth-title">Join Stage Music</h2>
            <p class="auth-subtitle">Create your account and start uploading music!</p>

            <!-- Alert Messages -->
            <div id="error-message" class="alert alert-error" style="display: none;"></div>
            <div id="success-message" class="alert alert-success" style="display: none;"></div>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="full_name">
                        <span class="label-icon">👤</span>
                        Full Name
                    </label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label for="username">
                        <span class="label-icon">@</span>
                        Username
                    </label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                    <small class="help-text">Username must be unique</small>
                </div>

                <div class="form-group">
                    <label for="email">
                        <span class="label-icon">📧</span>
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="password">
                        <span class="label-icon">🔒</span>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required placeholder="Choose a strong password" minlength="6">
                    <small class="help-text">Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirm_password">
                        <span class="label-icon">🔑</span>
                        Confirm Password
                    </label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="#" class="link-text">Terms & Conditions</a></span>
                    </label>
                </div>

                <button type="submit" class="btn-primary" id="register-btn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader" style="display: none;">⏳</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider">
                <span>or</span>
            </div>

            <!-- Login Link -->
            <div class="auth-footer">
                <p>Already have an account? <a href="/login.html" class="link-primary">Login here</a></p>
            </div>

            <!-- Home Link -->
            <div class="auth-footer" style="margin-top: 20px;">
                <a href="/" class="link-text">← Back to Homepage</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
